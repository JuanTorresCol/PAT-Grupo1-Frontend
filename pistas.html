<!DOCTYPE html>
<html lang = "es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name = "description" content="Listado de todas las pistas disponibles">
        <title>Pistas | AtilanoPadel</title>
        <link rel="stylesheet" href="css/styles.css">
        <script type="module" src="./pistas.js"></script>
    </head>
    <body>
        <header class = "header">
            <div class="container nav">
                <div class="logo">
                    <img class = "logo" src = "assets/img/LogoPadel.png">
                    ATILANOPADEL
                </div>

                <nav class="menu">
                    <a class = "menu-item" href="home.html">INICIO</a>
                    <a class = "menu-item" href="pistas.html">PISTAS</a>
                    <a class = "menu-item" href="reservas.html">RESERVAS</a>
                    <a class = "menu-item" href="perfil.html">PERFIL</a>
                </nav>
            </div>
        </header>
        <main class="container main-content">
            <section class="hero">
                <h1>Nuestras Pistas</h1>
                <p>Elige tus pistas favoritas y reserva en segundos!</p>
            </section>
            <section class="container">
                <div class="pistas-filtros">
                    <div class="filtro-box">
                        <label for="fecha">Fecha</label>
                        <input type="date" id="fecha" name="fecha">
                    </div>
                    <div class="filtro-box">
                        <label for="hora">Hora</label>
                        <select id="hora" name="hora">
                            <option selected>Cualquier hora</option>
                            <option>08:00</option>
                            <option>09:00</option>
                            <option>10:00</option>
                            <option>11:00</option>
                            <option>12:00</option>
                            <option>13:00</option>
                            <option>14:00</option>
                            <option>15:00</option>
                            <option>16:00</option>
                            <option>17:00</option>
                            <option>18:00</option>
                            <option>19:00</option>
                            <option>20:00</option>
                            <option>21:00</option>
                        </select>
                    </div>
                <button class="buscar-btn" type="button">Buscar</button>
            </div>
        </section>

            <section class="container pistas-section">
                <div id = "pistas-grid" class="pistas-grid">
                    <!-- Las pistas se insertan aquí dinámicamente desde JS -->
                </div>
            </section>
        </main>
        <footer class = "footer">
            <div class = "container footer">
                <p class="foot-note">Muchas gracias por usar nuestro servicio!</p><br>
                <p class="foot-note">Si está sufriendo dificultades técnicas y requiere de soporte no dude en contactarnos a través del número:</p><br>
                <p class = "foot-note"><strong>+34 914586011</strong></p><br>
                <p class = "foot-note">AtilanoPadel ©</p>
            </div>
        </footer>
    </body>
</html>
